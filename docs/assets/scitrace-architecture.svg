<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">SciTrace architecture</title>
  <desc id="desc">A diagram showing task stages connected to SIR, cumulative risk state, CTV, and verified tools.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf6f5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#14343a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="980" height="620" rx="28" fill="#f7f8f8"/>
  <rect x="40" y="42" width="900" height="536" rx="24" fill="url(#panel)" filter="url(#shadow)"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="88" y="105" fill="#172026" font-size="34" font-weight="800">SciTrace Safety Core</text>
    <text x="88" y="135" fill="#5c6870" font-size="17">Cross-stage risk memory plus trajectory-aware tool verification</text>

    <g fill="#ffffff" stroke="#d8e0e5" stroke-width="2">
      <rect x="86" y="188" width="160" height="78" rx="10"/>
      <rect x="292" y="188" width="196" height="78" rx="10"/>
      <rect x="534" y="188" width="160" height="78" rx="10"/>
      <rect x="740" y="188" width="160" height="78" rx="10"/>
    </g>
    <g fill="#172026" font-size="19" font-weight="800" text-anchor="middle">
      <text x="166" y="234">Thinker</text>
      <text x="390" y="234">Experimenter</text>
      <text x="614" y="234">Writer</text>
      <text x="820" y="234">Reviewer</text>
    </g>

    <g stroke="#087f83" stroke-width="4" stroke-linecap="round">
      <path d="M246 227 H292"/>
      <path d="M488 227 H534"/>
      <path d="M694 227 H740"/>
    </g>

    <rect x="126" y="330" width="330" height="104" rx="14" fill="#087f83"/>
    <text x="174" y="376" fill="#ffffff" font-size="24" font-weight="800">SIR</text>
    <text x="174" y="407" fill="#dff4f2" font-size="17">Safety-Intrinsic Reasoning Loop</text>

    <rect x="524" y="330" width="330" height="104" rx="14" fill="#b2413a"/>
    <text x="572" y="376" fill="#ffffff" font-size="24" font-weight="800">CTV</text>
    <text x="572" y="407" fill="#ffe5e2" font-size="17">Compositional Tool-Chain Verifier</text>

    <rect x="260" y="484" width="460" height="54" rx="27" fill="#172026"/>
    <text x="490" y="519" fill="#ffffff" font-size="17" font-weight="800" text-anchor="middle">Cumulative Risk State: SAFE to BLOCK</text>

    <g stroke="#b98919" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M390 266 C390 292 390 304 390 330"/>
      <path d="M689 266 C689 292 689 304 689 330"/>
      <path d="M291 434 C291 474 342 484 410 484"/>
      <path d="M689 434 C689 474 638 484 570 484"/>
      <path d="M490 484 C490 450 490 424 490 390"/>
    </g>

    <g fill="#5c6870" font-size="15">
      <text x="110" y="294">Stage content + prior warnings</text>
      <text x="628" y="294">Tool request + full trajectory</text>
    </g>
  </g>
</svg>
