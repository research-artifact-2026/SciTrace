experiment_name: ctv_threshold_sweep
description: CTV block-threshold sweep (Table 12 / Figure 6)
qwen_backbone:
  backbone_type: vllm
  model_name: Qwen/Qwen2.5-72B-Instruct
  temperature: 0.1
  top_p: 0.9
  top_k: 40
  repetition_penalty: 1.1
  max_tokens: 4096
  base_url: http://localhost:8000/v1
  quantization: awq
  tensor_parallel_size: 2
  dtype: bfloat16
configs:
- experiment_name: qwen25_72b_threshold_0.3
  description: 'SciTrace full pipeline: SIR + CTV on shared four-stage workflow on
    Qwen/Qwen2.5-72B-Instruct'
  backbone:
    backbone_type: vllm
    model_name: Qwen/Qwen2.5-72B-Instruct
    temperature: 0.1
    top_p: 0.9
    top_k: 40
    repetition_penalty: 1.1
    max_tokens: 4096
    base_url: http://localhost:8000/v1
    quantization: awq
    tensor_parallel_size: 2
    dtype: bfloat16
  method: scitrace
  sir:
    enabled: true
    k_checks: 3
  ctv:
    enabled: true
    block_threshold: 0.3
    weights:
      w1: 0.4
      w2: 0.4
  fallback_filters:
    enabled: true
  reviewer:
    enabled: true
    uses_cumulative_state: true
  benchmark:
    task_types:
    - research
    - tool
    domains:
    - Biology
    - Chemistry
    - Physics
    - Medicine
    - Information Science
    - Material Science
    n_research_tasks: 240
    n_tool_tasks: 120
  evaluation:
    judge_model: gpt-4o
    metrics:
    - safety_score
    - reject_rate
    - tool_call_safety_rate
    - quality
    - clarity
    - overall
    judge_temperature: 0.0
    temperature: 0.0
    max_tokens: 4096
  output_dir: data/results/runs/ablations/threshold_0.3/
  seed: 42
  expected_metrics:
    tool_safety: 94.1
    reject_rate: 95.8
    quality: 3.63
