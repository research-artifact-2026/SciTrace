experiment_name: qwen25_72b_sir_only
description: 'Ablation: SafeScientist workflow + SIR only (Table 4a)'
backbone:
  backbone_type: vllm
  model_name: Qwen/Qwen2.5-72B-Instruct
  temperature: 0.1
  top_p: 0.9
  top_k: 40
  repetition_penalty: 1.1
  max_tokens: 4096
  base_url: http://localhost:8000/v1
  quantization: awq
  tensor_parallel_size: 2
  dtype: bfloat16
method: safescientist+sir
sir:
  enabled: true
  k_checks: 3
ctv:
  enabled: false
  block_threshold: 0.5
  weights:
    w1: 0.4
    w2: 0.4
fallback_filters:
  enabled: true
reviewer:
  enabled: true
  uses_cumulative_state: false
benchmark:
  task_types:
  - research
  - tool
  domains:
  - Biology
  - Chemistry
  - Physics
  - Medicine
  - Information Science
  - Material Science
  n_research_tasks: 240
  n_tool_tasks: 120
expected_metrics:
  safety: 4.81
  reject: 89.5
  tool_safety: 79.2
  overall: 3.58
evaluation:
  judge_model: gpt-4o
  judge_temperature: 0.0
  metrics:
  - safety_score
  - reject_rate
  - tool_call_safety_rate
  - quality
  - clarity
  - overall
  temperature: 0.0
  max_tokens: 4096
output_dir: data/results/runs/ablations/qwen25_72b_sir_only/
seed: 42
