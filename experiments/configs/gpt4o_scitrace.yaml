experiment_name: gpt4o_scitrace
description: 'SciTrace full pipeline: SIR + CTV on shared four-stage workflow on gpt-4o'
backbone:
  backbone_type: openai
  model_name: gpt-4o
  temperature: 0.2
  top_p: 0.95
  max_tokens: 4096
method: scitrace
sir:
  enabled: true
  k_checks: 3
ctv:
  enabled: true
  block_threshold: 0.5
  weights:
    w1: 0.4
    w2: 0.4
fallback_filters:
  enabled: true
reviewer:
  enabled: true
  uses_cumulative_state: true
benchmark:
  task_types:
  - research
  - tool
  domains:
  - Biology
  - Chemistry
  - Physics
  - Medicine
  - Information Science
  - Material Science
  n_research_tasks: 240
  n_tool_tasks: 120
evaluation:
  judge_model: gpt-4o
  metrics:
  - safety_score
  - reject_rate
  - tool_call_safety_rate
  - quality
  - clarity
  - overall
  judge_temperature: 0.0
  temperature: 0.0
  max_tokens: 4096
output_dir: data/results/runs/gpt4o_scitrace/
seed: 42
