<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">SciSafetyBench benchmark distribution</title>
  <desc id="desc">Six scientific domains each contain 40 research tasks and 20 tool tasks; four risk types are equally represented.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#172026" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:800 34px Inter,Arial,sans-serif;fill:#172026}
      .sub{font:500 16px Inter,Arial,sans-serif;fill:#5c6870}
      .label{font:750 18px Inter,Arial,sans-serif;fill:#172026}
      .small{font:500 14px Inter,Arial,sans-serif;fill:#5c6870}
      .num{font:850 32px Inter,Arial,sans-serif;fill:#087f83}
      .white{fill:#fff}
    </style>
  </defs>

  <rect width="1080" height="620" rx="26" fill="#f6f8f8"/>
  <text x="54" y="64" class="title">SciSafetyBench Distribution</text>
  <text x="54" y="94" class="sub">240 high-risk research tasks + 120 tool-related risk tasks across six scientific domains</text>

  <g transform="translate(70 134)" filter="url(#shadow)">
    <rect width="600" height="396" rx="18" fill="#ffffff" stroke="#d7e0e4"/>
    <circle cx="300" cy="190" r="92" fill="#eaf6f5" stroke="#d7e0e4"/>
    <text x="300" y="174" text-anchor="middle" class="label">SciSafetyBench</text>
    <text x="300" y="215" text-anchor="middle" class="num">360</text>
    <text x="300" y="239" text-anchor="middle" class="small">total tasks</text>

    <g transform="translate(300 190)">
      <g transform="rotate(0)">
        <path d="M0,-118 L48,-202 A208,208 0 0,1 150,-145 L84,-84 Z" fill="#cdd7ff"/>
        <text x="88" y="-150" text-anchor="middle" class="small">Info Sci.</text>
      </g>
      <g transform="rotate(60)">
        <path d="M0,-118 L48,-202 A208,208 0 0,1 150,-145 L84,-84 Z" fill="#ffeaa7"/>
        <text x="88" y="-150" text-anchor="middle" class="small" transform="rotate(-60 88 -150)">Physics</text>
      </g>
      <g transform="rotate(120)">
        <path d="M0,-118 L48,-202 A208,208 0 0,1 150,-145 L84,-84 Z" fill="#fff0a8"/>
        <text x="88" y="-150" text-anchor="middle" class="small" transform="rotate(-120 88 -150)">Medicine</text>
      </g>
      <g transform="rotate(180)">
        <path d="M0,-118 L48,-202 A208,208 0 0,1 150,-145 L84,-84 Z" fill="#d7f4c7"/>
        <text x="88" y="-150" text-anchor="middle" class="small" transform="rotate(-180 88 -150)">Chemistry</text>
      </g>
      <g transform="rotate(240)">
        <path d="M0,-118 L48,-202 A208,208 0 0,1 150,-145 L84,-84 Z" fill="#b9efe0"/>
        <text x="88" y="-150" text-anchor="middle" class="small" transform="rotate(-240 88 -150)">Material</text>
      </g>
      <g transform="rotate(300)">
        <path d="M0,-118 L48,-202 A208,208 0 0,1 150,-145 L84,-84 Z" fill="#c7defa"/>
        <text x="88" y="-150" text-anchor="middle" class="small" transform="rotate(-300 88 -150)">Biology</text>
      </g>
    </g>
  </g>

  <g transform="translate(710 134)" filter="url(#shadow)">
    <rect width="316" height="396" rx="18" fill="#ffffff" stroke="#d7e0e4"/>
    <text x="28" y="44" class="label">Per-domain split</text>
    <text x="28" y="70" class="small">Each domain has the same task count.</text>
    <g transform="translate(28 102)">
      <rect width="110" height="28" rx="6" fill="#087f83"/>
      <rect x="114" width="56" height="28" rx="6" fill="#b2413a"/>
      <text x="184" y="20" class="small">40 research / 20 tool</text>
    </g>
    <g transform="translate(28 158)">
      <text x="0" y="0" class="label">Risk types</text>
      <text x="0" y="26" class="small">Equal proportion across labels</text>
      <g transform="translate(0 54)">
        <rect width="260" height="22" rx="4" fill="#f4d35e"/>
        <rect y="34" width="260" height="22" rx="4" fill="#7bdff2"/>
        <rect y="68" width="260" height="22" rx="4" fill="#b2f7ef"/>
        <rect y="102" width="260" height="22" rx="4" fill="#f7a399"/>
        <g class="small" fill="#172026">
          <text x="10" y="16">Intentional malice</text><text x="224" y="16">25%</text>
          <text x="10" y="50">Concealed harm</text><text x="224" y="50">25%</text>
          <text x="10" y="84">Unintentional consequences</text><text x="224" y="84">25%</text>
          <text x="10" y="118">Intrinsic execution hazards</text><text x="224" y="118">25%</text>
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(70 558)">
    <rect width="15" height="15" rx="3" fill="#087f83"/><text x="24" y="13" class="small">Research tasks: 240 total</text>
    <rect x="214" width="15" height="15" rx="3" fill="#b2413a"/><text x="238" y="13" class="small">Tool-related risk tasks: 120 total</text>
    <text x="548" y="13" class="small">Source: Section 4.1 benchmark setting</text>
  </g>
</svg>
